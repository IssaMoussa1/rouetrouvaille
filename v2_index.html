<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Une question... 🩷</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lora:ital,wght@0,400;1,400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }

  body {
    min-height:100vh;
    font-family:'Fredoka One',cursive;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    position:relative;
    /* Background transitions from grey to warm sky */
    background: linear-gradient(180deg, #c8c8d4 0%, #d8d8e2 50%, #e8e8f0 100%);
    transition: background 1.2s ease;
  }

  /* ── Sky / clouds ── */
  .sky {
    position:fixed; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none; z-index:0;
    overflow:hidden;
  }

  .cloud {
    position:absolute;
    transition: opacity 1.4s ease, transform 1.4s ease;
    animation: drift linear infinite;
    will-change: transform, opacity;
  }
  @keyframes drift {
    from { transform: translateX(var(--drift-start, 110vw)); }
    to   { transform: translateX(var(--drift-end, -60vw)); }
  }

  /* Sun — hidden initially, reveals progressively */
  .sun {
    position:fixed;
    top:-120px; right:8%;
    left:auto;
    transform:none;
    width:200px; height:200px;
    z-index:1;
    transition: top 1.5s cubic-bezier(0.34,1.1,0.64,1), opacity 1.2s ease;
    opacity:0;
    pointer-events:none;
  }
  .sun-circle {
    width:140px; height:140px;
    background:radial-gradient(circle, #FFE566 0%, #FFD700 60%, #FFA500 100%);
    border-radius:50%;
    margin:30px auto 0;
    box-shadow: 0 0 40px rgba(255,210,0,0.5), 0 0 80px rgba(255,180,0,0.25);
    animation: sunPulse 3s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow:0 0 40px rgba(255,210,0,0.5),0 0 80px rgba(255,180,0,0.25); }
    50%      { box-shadow:0 0 60px rgba(255,210,0,0.7),0 0 120px rgba(255,180,0,0.35); }
  }

  /* ── Floaters ── */
  .hearts-bg { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
  .heart-float { position:absolute; opacity:0; animation:floatUp linear infinite; }
  @keyframes floatUp {
    0%   { transform:translateY(100vh) scale(0.5); opacity:0; }
    10%  { opacity:0.5; } 90% { opacity:0.2; }
    100% { transform:translateY(-10vh) scale(1.2); opacity:0; }
  }

  /* ── Main content ── */
  .main { position:relative; z-index:2; text-align:center; padding:24px 20px; width:100%; max-width:520px; }

  h1 {
    font-family:'Fredoka One',cursive; font-weight:400;
    font-size:clamp(20px,5vw,28px); color:#c8385a;
    margin-bottom:28px; line-height:1.4;
    transition: color 1s ease;
  }

  .cat-container { width:200px; height:200px; margin:0 auto 32px; display:flex; align-items:center; justify-content:center; }
  #catImg { width:200px; height:200px; object-fit:contain; mix-blend-mode:multiply; display:block; transition:opacity 0.3s ease; }

  .buttons-wrapper { display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:nowrap; }

  #btnOui {
    background:#4caf50; color:white;
    font-family:'Fredoka One',cursive; font-weight:400;
    border:none; border-radius:18px; cursor:pointer;
    font-size:26px; padding:18px 52px;
    box-shadow:0 6px 20px rgba(76,175,80,0.35);
    transition:font-size 0.4s ease, padding 0.4s ease, border-radius 0.4s ease;
    white-space:nowrap; flex-shrink:0;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  #btnNon {
    background:#e53935; color:white;
    font-family:'Fredoka One',cursive; font-weight:400;
    border:none; border-radius:50px; cursor:pointer;
    font-size:18px; padding:14px 28px;
    box-shadow:0 4px 14px rgba(229,57,53,0.3);
    white-space:nowrap; flex-shrink:0;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent; min-width:80px;
  }
  #btnNon.fleeing {
    position:fixed; z-index:100;
    transition:left 0.5s cubic-bezier(0.34,1.2,0.64,1), top 0.5s cubic-bezier(0.34,1.2,0.64,1);
    touch-action:manipulation;
  }
  .toast { margin-top:20px; font-family:'Lora',serif; font-style:italic; color:#b03060; font-size:15px; min-height:24px; opacity:0; transition:opacity 0.4s ease; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<div class="sky" id="sky"></div>
<div class="sun" id="sun">
  <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
       style="animation:rotateSlow 20s linear infinite; display:block;">
    <defs>
      <radialGradient id="sunGradIdx" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#fff9aa"/>
        <stop offset="40%"  stop-color="#FFE566"/>
        <stop offset="75%"  stop-color="#FFD700"/>
        <stop offset="100%" stop-color="#FFA500"/>
      </radialGradient>
      <filter id="glowIdx" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- Rays centered at 100,100 -->
    <g transform="translate(100,100)">
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(0)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(30)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(60)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(90)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(120)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(150)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(180)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(210)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(240)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(270)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(300)"/>
      <rect x="-2" y="-98" width="4" height="38" rx="2" fill="rgba(255,220,0,0.6)" transform="rotate(330)"/>
    </g>
    <!-- Circle centered at 100,100 -->
    <circle cx="100" cy="100" r="56" fill="url(#sunGradIdx)" filter="url(#glowIdx)"/>
  </svg>
</div>
<div class="hearts-bg" id="heartsBg"></div>

<div class="main">
  <h1>Veux-tu être à nouveau mon amoureuse ? 🩷</h1>
  <div class="cat-container">
    <img id="catImg" alt="" src="https://media.tenor.com/_xQ3HRStAYQAAAAj/peach-goma.gif">
  </div>
  <div class="buttons-wrapper">
    <button id="btnOui" onclick="clickOui()">Oui</button>
    <button id="btnNon" onclick="clickNon()">Non</button>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
// ── GIFs ──────────────────────────────────────────────────────────────
const GIFS = [
  'https://media.tenor.com/_xQ3HRStAYQAAAAj/peach-goma.gif',
  'https://media.tenor.com/g7d2LDaf27EAAAAj/love-you.gif',
  'https://media.tenor.com/pwzFZHnFRF4AAAAj/tkthao219-tooji.gif',
  'https://media.tenor.com/tXJsHJmrkIcAAAAj/bubu-dudu.gif',
  'https://media.tenor.com/QohdHKK7bVsAAAAj/peach-goma.gif',
  'https://media.tenor.com/mfE9Qgm0QZoAAAAj/peach-goma.gif',
];

function showCat(idx) {
  const img = document.getElementById('catImg');
  img.style.opacity = '0';
  setTimeout(function() {
    img.src = GIFS[Math.min(idx, GIFS.length - 1)];
    img.style.opacity = '1';
  }, 200);
}

// ── Clouds ────────────────────────────────────────────────────────────
const sky = document.getElementById('sky');
const cloudDefs = [
  { top:1,  w:380, h:140, dur:38, delay:0,    op:0.96, white:0.98 },
  { top:5,  w:300, h:110, dur:52, delay:-14,  op:0.92, white:0.95 },
  { top:0,  w:260, h:100, dur:45, delay:-28,  op:0.88, white:0.96 },
  { top:9,  w:340, h:125, dur:60, delay:-7,   op:0.90, white:0.94 },
  { top:13, w:200, h:80,  dur:36, delay:-20,  op:0.82, white:0.93 },
  // extra clouds user asked for
  { top:3,  w:280, h:105, dur:48, delay:-32,  op:0.85, white:0.94 },
  { top:17, w:240, h:90,  dur:55, delay:-42,  op:0.78, white:0.91 },
  { top:20, w:320, h:115, dur:65, delay:-18,  op:0.72, white:0.90 },
  // bg clouds
  { top:22, w:180, h:70,  dur:75, delay:-38,  op:0.50, white:0.78 },
  { top:7,  w:160, h:65,  dur:68, delay:-55,  op:0.48, white:0.76 },
];

const cloudEls = [];
cloudDefs.forEach(function(cfg, i) {
  const div = document.createElement('div');
  div.className = 'cloud';
  div.style.top = cfg.top + 'vh';
  div.style.animationDuration  = cfg.dur + 's';
  div.style.animationDelay = cfg.delay + 's';
  div.style.opacity = cfg.op;
  const col = `rgba(255,255,255,${cfg.white})`;
  const w = cfg.w, h = cfg.h;
  div.innerHTML = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="${w*.5}"  cy="${h*.65}" rx="${w*.42}" ry="${h*.38}" fill="${col}"/>
    <ellipse cx="${w*.28}" cy="${h*.72}" rx="${w*.22}" ry="${h*.28}" fill="${col}"/>
    <ellipse cx="${w*.72}" cy="${h*.72}" rx="${w*.20}" ry="${h*.25}" fill="${col}"/>
    <ellipse cx="${w*.38}" cy="${h*.45}" rx="${w*.22}" ry="${h*.28}" fill="${col}"/>
    <ellipse cx="${w*.62}" cy="${h*.42}" rx="${w*.20}" ry="${h*.26}" fill="${col}"/>
  </svg>`;
  sky.appendChild(div);
  cloudEls.push({ el:div, baseOp:cfg.op });
});

// ── Sky backgrounds per stage ─────────────────────────────────────────
const skyStages = [
  'linear-gradient(180deg,#c8c8d4 0%,#d8d8e2 50%,#e8e8f0 100%)', // 0 — grey
  'linear-gradient(180deg,#bfc8d8 0%,#d0d8e4 50%,#e4eaf2 100%)', // 1 — grey-blue
  'linear-gradient(180deg,#b8c4d4 0%,#cdd8e2 50%,#e0e8f0 100%)', // 2 — blue hint
  'linear-gradient(180deg,#b0c0d0 0%,#c8d4e0 45%,#e0e8d8 100%)', // 3 — blue+warm
  'linear-gradient(180deg,#b0bcc8 0%,#c8d0cc 40%,#dde4c8 100%)', // 4 — clearing
  'linear-gradient(180deg,#a8b8c4 0%,#c4cebc 35%,#d8e0b8 100%)', // 5 — bright
];

// ── State ─────────────────────────────────────────────────────────────
var nonCount    = 0;
var isFleeing   = false;
var ouiUnlocked = false;
var lastFlee    = 0;

var nonTexts = [
  'Non',
  "T'es sûre ? 🤔",
  'Sirine... 😥',
  'Vraiment ? 😢',
  "S'il te plaît… 🙏",
  '😭 😭 😭'
];

function updateSky(step) {
  // Transition background
  const stage = Math.min(step, skyStages.length - 1);
  document.body.style.background = skyStages[stage];

  // Clouds: progressively fade out (roughly 2 clouds per click)
  const totalClouds = cloudEls.length;
  // How many to hide = step * 2, from the front (foreground) clouds first
  const toHide = Math.min(step * 2, totalClouds);
  cloudEls.forEach(function(c, i) {
    if (i < toHide) {
      c.el.style.opacity = '0';
      c.el.style.transform = 'translateY(-40px) ' + c.el.style.transform;
    } else {
      c.el.style.opacity = c.baseOp;
    }
  });

  // Sun appears progressively
  const sun = document.getElementById('sun');
  if (step >= 2) {
    // Sun peeks in from top
    const peekPercent = Math.min((step - 2) / 3, 1); // 0 at step 2, 1 at step 5
    const topPx = -120 + peekPercent * 100; // from -120px to -20px
    sun.style.top    = topPx + 'px';
    sun.style.opacity = 0.3 + peekPercent * 0.7;
    sun.style.right = '8%';
  }
}

function clickOui() {
  if (!ouiUnlocked) {
    showToast('Clique quand même sur non pour voir 🫣');
    return;
  }
  window.location.href = 'v2_yes.html';
}

function clickNon() {
  nonCount++;

  // Oui grows
  var btnOui = document.getElementById('btnOui');
  btnOui.style.fontSize    = Math.min(26*Math.pow(1.45,nonCount),90)+'px';
  btnOui.style.padding     = Math.min(18*Math.pow(1.3,nonCount),70)+'px '+Math.min(52*Math.pow(1.3,nonCount),160)+'px';
  btnOui.style.borderRadius = Math.min(18+nonCount*4,40)+'px';

  // Non shrinks
  var btnNon = document.getElementById('btnNon');
  if (!isFleeing) btnNon.style.transform = 'scale('+Math.max(0.5,1-nonCount*0.09)+')';
  btnNon.style.opacity = Math.max(0.5,1-nonCount*0.07);
  btnNon.textContent = nonTexts[Math.min(nonCount, nonTexts.length-1)];

  // GIF
  showCat(nonCount);

  // Sky progression
  updateSky(nonCount);

  // Flee at 5
  if (nonCount >= 5 && !isFleeing) activateFlee();

  showToast('');
}

function activateFlee() {
  isFleeing = true; ouiUnlocked = true;
  var btn  = document.getElementById('btnNon');
  var rect = btn.getBoundingClientRect();
  btn.style.transition = 'none';
  btn.style.transform  = 'none';
  btn.classList.add('fleeing');
  btn.style.left = rect.left+'px';
  btn.style.top  = rect.top+'px';
  requestAnimationFrame(function() { btn.style.transition = ''; });
  document.addEventListener('mousemove', function(e) { flee(e.clientX,e.clientY); });
  document.addEventListener('touchmove', function(e) { if(e.touches[0]) flee(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
}

function flee(cx,cy) {
  var now=Date.now(); if(now-lastFlee<250) return;
  var btn=document.getElementById('btnNon'),r=btn.getBoundingClientRect();
  if(Math.hypot(cx-(r.left+r.width/2),cy-(r.top+r.height/2))<140){
    lastFlee=now;
    var m=20,bw=btn.offsetWidth,bh=btn.offsetHeight;
    btn.style.left=(m+Math.random()*(window.innerWidth-bw-m*2))+'px';
    btn.style.top=(m+Math.random()*(window.innerHeight-bh-m*2))+'px';
  }
}

function showToast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.toggle('show',!!msg);
}

// Floating hearts
var bg=document.getElementById('heartsBg');
['🩶','🩷','🤍','💗','🩶','🩷'].forEach(function(e){
  for(var j=0;j<3;j++){
    var h=document.createElement('span'); h.className='heart-float'; h.textContent=e;
    h.style.left=Math.random()*100+'%'; h.style.fontSize=(12+Math.random()*14)+'px';
    h.style.animationDuration=(7+Math.random()*10)+'s'; h.style.animationDelay=(Math.random()*8)+'s';
    bg.appendChild(h);
  }
});
</script>

  <button id="musicBtn" onclick="toggleMusic()" style="position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,0.85);font-size:20px;cursor:pointer;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,0.2);touch-action:manipulation;">🔇</button>
  <audio id="bgMusic" src="glue-song.mp3" loop></audio>
  <script>
    var _playing = false;
    function toggleMusic() {
      var a = document.getElementById("bgMusic");
      var b = document.getElementById("musicBtn");
      if (!_playing) {
        a.play();
        _playing = true;
        b.textContent = "🔊";
      } else {
        a.pause();
        _playing = false;
        b.textContent = "🔇";
      }
    }
  </script>
</body>
</html>
